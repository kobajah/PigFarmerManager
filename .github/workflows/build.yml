name: Build APK
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project zip
        run: unzip PigFarmManager.zip

      - name: Fix Kotlin version to 2.0.21
        run: |
          cd PigFarmManager
          sed -i 's/kotlin              = "1.9.24"/kotlin              = "2.0.21"/' gradle/libs.versions.toml
          sed -i 's/ksp                 = "1.9.24-1.0.20"/ksp                 = "2.0.21-1.0.28"/' gradle/libs.versions.toml
          sed -i 's/agp                 = "8.5.2"/agp                 = "8.6.1"/' gradle/libs.versions.toml

      - name: Create gradle.properties
        run: |
          cat > PigFarmManager/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=35
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          kotlin.code.style=official
          EOF

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: |
          cd PigFarmManager
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PigFarmManager-debug
          path: PigFarmManager/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
