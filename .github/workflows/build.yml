name: Build APK
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project zip
        run: unzip PigFarmManager.zip

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK
        run: |
          cd PigFarmManager
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PigFarmManager-debug
          path: PigFarmManager/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
