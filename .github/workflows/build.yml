name: Build APK
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project zip
        run: unzip PigFarmManager_v2.zip

      - name: Fix versions
        working-directory: PigFarmManager
        run: |
          sed -i 's/kotlin              = "1.9.24"/kotlin              = "2.0.21"/' gradle/libs.versions.toml
          sed -i 's/ksp                 = "1.9.24-1.0.20"/ksp                 = "2.0.21-1.0.28"/' gradle/libs.versions.toml
          sed -i 's/agp                 = "8.5.2"/agp                 = "8.6.1"/' gradle/libs.versions.toml

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build APK
        working-directory: PigFarmManager
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PigFarmManager-debug
          path: PigFarmManager/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
